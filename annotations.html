<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annotations — Organizational Worldviews</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    a { text-decoration: none; }

    :root {
      --ink:  #111111;
      --mid:  #111111;
      --faint:#111111;
      --rule: #111111;
      --ff:   'Suisse Intl', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --ff-serif: 'EB Garamond', Georgia, serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: #ffffff;
      color: var(--ink);
      font-family: var(--ff);
      font-size: 14px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }

    :root {
      --start-num:     0%;
      --start-author:  15%;
      --start-section: 30%;
      --start-year:    75%;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 10px 0;
      background: #ffffff;
      border-bottom: 1px solid var(--ink);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      font-weight: 400;
      vertical-align: middle;
      text-align: left;
    }
    .map-link {
      color: var(--ink);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    td {
      padding: 9px 0;
      vertical-align: top;
      border-bottom: 1px solid var(--rule);
    }

    .col-num     { width: calc(var(--start-author)  - var(--start-num));     padding-left: 24px; font-variant-numeric: tabular-nums; color: var(--ink); vertical-align: middle; }
    .col-author  { width: calc(var(--start-section) - var(--start-author));  padding-right: 24px; }
    .col-section { width: calc(var(--start-year)    - var(--start-section)); color: var(--ink); vertical-align: middle; }
    .col-year    { width: calc(100%                 - var(--start-year));    color: var(--ink); vertical-align: middle; padding-right: 24px; }

    .entry-row { cursor: pointer; }
    .entry-row td { transition: color 0.15s ease; }
    .entry-row:hover td { color: #6670d8; }

    .entry-detail { display: none; }
    .entry-detail.open { display: table-row; }
    .entry-detail td { padding-top: 0; border-bottom: 1px solid var(--rule); }
    .detail-inner { padding: 16px 24px 24px 0; }

    .detail-citation {
      line-height: 1.6;
      color: var(--ink);
      padding-top: 20px;
      margin-bottom: 14px;
      max-width: 680px;
      cursor: text;
      outline: none;
    }
    .detail-citation em { font-style: italic; }
    .detail-citation[contenteditable="true"] {
      border-bottom: 1px solid var(--ink);
    }

    .detail-annotation {
      font-family: 'Sabon', 'Sabon LT Std', Georgia, serif;
      font-size: 27px;
      line-height: 1.55;
      color: #2255cc;
      max-width: 70%;
      padding-top: 20px;
      padding-bottom: 32px;
      white-space: pre-wrap;
      cursor: text;
      outline: none;
    }
    .detail-annotation[contenteditable="true"] {
      border-bottom: 1px solid #2255cc;
    }
    .detail-annotation.pending {
      font-family: var(--ff);
      font-size: 14px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--ink);
    }

    /* ── Keywords ── */
    .keywords-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
      margin-bottom: 20px;
      align-items: center;
    }
    .keyword-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #ffffff;
      border: 1px solid #111111;
      border-radius: 100px;
      padding: 4px 10px 4px 12px;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #111111;
    }
    .keyword-remove {
      cursor: pointer;
      opacity: 0.35;
      font-size: 15px;
      line-height: 1;
      margin-left: 1px;
    }
    .keyword-remove:hover { opacity: 1; }
    .keyword-add-btn {
      display: inline-flex;
      align-items: center;
      cursor: pointer;
      opacity: 0.3;
      font-size: 11px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1px solid var(--ink);
      border-radius: 100px;
      user-select: none;
    }
    .keyword-add-btn:hover { opacity: 0.8; }

    /* ── Annotation progress ── */
    .annot-progress {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--ink);
      opacity: 0.35;
      margin-left: 8px;
      font-variant-numeric: tabular-nums;
      vertical-align: middle;
    }

    /* ── Active keyword highlight ── */
    .keyword-pill.kw-active {
      background: #111111;
      color: #ffffff;
      border-color: #111111;
    }
    .keyword-pill.kw-active .keyword-remove { color: #ffffff; }

    /* ── Sort button ── */
    .sort-btn {
      cursor: pointer;
      user-select: none;
      font-size: 11px;
      letter-spacing: 0.07em;
      margin-left: 4px;
      color: var(--ink);
      opacity: 0.3;
    }
    .sort-btn:hover { opacity: 0.8; }
    .sort-btn.active { opacity: 1; color: #6670d8; }

    /* ── Keyword filter list in filter panel ── */
    .fg-keywords { flex: 1; padding-right: 0; }
    .fg-kw-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 4px;
    }
    .fg-kw-tag {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid var(--ink);
      border-radius: 100px;
      padding: 3px 10px;
      cursor: pointer;
      opacity: 0.45;
      user-select: none;
      transition: opacity 0.12s, background 0.12s, color 0.12s;
    }
    .fg-kw-tag:hover { opacity: 0.85; }
    .fg-kw-tag.active {
      background: #111111;
      color: #ffffff;
      opacity: 1;
    }
    .keyword-input {
      font-family: var(--ff);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid var(--ink);
      border-radius: 100px;
      padding: 4px 12px;
      outline: none;
      width: 130px;
      background: none;
    }

    /* ── Bottom action row (delete + terrain) ── */
    .action-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 8px;
    }
    .edit-btn {
      display: inline-block;
      cursor: pointer;
      font-size: 11px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      opacity: 0.2;
      color: var(--ink);
      user-select: none;
    }
    .edit-btn:hover { opacity: 1; }

    /* ── Delete button ── */
    .delete-btn {
      display: inline-block;
      cursor: pointer;
      font-size: 11px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      opacity: 0.2;
      color: var(--ink);
      user-select: none;
    }
    .delete-btn:hover { opacity: 1; color: #cc2222; }


    /* ── Search input ── */
    .search-input {
      background: none;
      border: none;
      outline: none;
      font-family: var(--ff);
      font-size: 14px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--ink);
      width: 100%;
      padding: 0;
      cursor: text;
    }
    .search-input::placeholder { color: var(--ink); opacity: 0.35; }

    /* ── Filter button ── */
    .filter-btn {
      float: right;
      margin-right: 12px;
      cursor: pointer;
      user-select: none;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #6670d8;
    }

    /* ── Add button ── */
    .add-btn {
      float: right;
      margin-right: 20px;
      cursor: pointer;
      user-select: none;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #111111;
      opacity: 1;
    }
    .add-btn:hover { opacity: 1; }

    /* ── Filter panel ── */
    .filter-pane-wrap {
      position: fixed;
      top: 44px;
      left: var(--start-author);
      right: calc(100% - var(--start-year));
      z-index: 199;
      background: #ffffff;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .filter-pane-wrap.open { max-height: 700px; }

    /* 2-row grid: [Year | Type] on row 1, [Keywords spanning both] on row 2 */
    .filter-groups {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-areas:
        "year type"
        "kw   kw";
      padding: 20px 24px 24px 24px;
      row-gap: 20px;
      column-gap: 32px;
    }
    .fg-section { flex: 2; }
    .fg-year { grid-area: year; }
    .fg-type { grid-area: type; }
    .fg-keywords { grid-area: kw; padding-right: 0; }
    .fg-title { font-size: 14px; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 10px; }
    .fg-opts { display: flex; flex-direction: column; gap: 6px; }
    .fg-opts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; }
    .filter-opt { display: flex; align-items: center; gap: 8px; cursor: pointer; line-height: 1; }
    .filter-opt input[type="radio"] {
      -webkit-appearance: none; appearance: none;
      width: 9px; height: 9px;
      border: 1px solid var(--ink); border-radius: 50%;
      cursor: pointer; flex-shrink: 0;
      transition: background 0.15s ease;
    }
    .filter-opt input[type="radio"]:checked { background: var(--ink); }

    /* ── Add Source Modal ── */
    .add-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .add-modal-overlay.open { display: flex; }
    .add-modal {
      background: #fff;
      border: 1px solid var(--ink);
      padding: 40px;
      max-width: 600px;
      width: 90%;
    }
    .add-modal-title {
      font-size: 14px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      font-weight: 400;
      margin-bottom: 28px;
    }
    .add-field { margin-bottom: 18px; }
    .add-field label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.45;
      margin-bottom: 5px;
    }
    .add-field input,
    .add-field select,
    .add-field textarea {
      width: 100%;
      font-family: var(--ff);
      font-size: 14px;
      border: none;
      border-bottom: 1px solid var(--ink);
      outline: none;
      padding: 4px 0;
      background: none;
      color: var(--ink);
    }
    .add-field textarea { resize: vertical; min-height: 70px; }
    .add-field select { cursor: pointer; }
    .add-actions { display: flex; gap: 12px; margin-top: 28px; }
    .btn-primary {
      cursor: pointer; font-family: var(--ff); font-size: 13px;
      letter-spacing: 0.07em; text-transform: uppercase;
      background: var(--ink); color: #fff;
      border: none; padding: 9px 22px;
    }
    .btn-cancel {
      cursor: pointer; font-family: var(--ff); font-size: 13px;
      letter-spacing: 0.07em; text-transform: uppercase;
      background: none; color: var(--ink);
      border: 1px solid var(--ink); padding: 9px 22px;
    }
    .btn-primary:disabled { opacity: 0.4; cursor: default; }

    /* ── Saving indicator ── */
    .save-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--ink);
      color: #fff;
      font-size: 11px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 8px 16px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 2000;
    }
    .save-toast.show { opacity: 1; }

    /* ── Export button ── */
    .export-btn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 500;
      cursor: pointer;
      font-family: var(--ff);
      font-size: 11px;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--ink);
      background: #ffffff;
      border: 1px solid var(--ink);
      padding: 8px 16px;
      opacity: 0.35;
      transition: opacity 0.15s;
    }
    .export-btn:hover { opacity: 1; }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      :root { --start-num: 0%; --start-author: 10%; --start-section: 48%; --start-year: 82%; }
      thead th { padding: 8px 0; font-size: 11px; }
      .detail-annotation { font-size: 22px; max-width: 95%; }
      .detail-inner { padding: 12px 12px 16px 0; }
      .filter-pane-wrap { left: 0 !important; right: 0 !important; }
      .filter-groups { grid-template-columns: 1fr 1fr; padding: 16px 12px 16px 12px; row-gap: 16px; column-gap: 16px; }
      .fg-keywords { padding-right: 0; }
      .map-link { display: none; }
    }
    @media (max-width: 480px) {
      :root { --start-num: 0%; --start-author: 0%; --start-section: 0%; --start-year: 75%; }
      .col-num { display: none; } .col-section { display: none; }
      .col-author { width: 75%; padding-right: 8px; }
      .col-year { width: 25%; }
      thead th.col-num, thead th.col-section { display: none; }
      .detail-annotation { font-size: 22px; }
      .map-link { display: none; }
      .filter-groups { grid-template-columns: 1fr; grid-template-areas: "year" "type" "kw"; }
    }
  </style>
</head>
<body>

<table>
  <thead>
    <tr>
      <th class="col-num"><a href="index.html" class="map-link">← Map</a><span id="annot-progress" class="annot-progress"></span></th>
      <th class="col-author"><input type="text" id="search-input" class="search-input" placeholder="Search…" autocomplete="off" spellcheck="false"></th>
      <th class="col-section">Title</th>
      <th class="col-year">
        <span class="add-btn" id="add-btn">+ Add</span>
        <span class="filter-btn" id="filter-btn">Filter</span>
        Year <span class="sort-btn" id="sort-btn" title="Toggle sort: default / by year">↕</span>
      </th>
    </tr>
  </thead>
  <tbody id="sources-tbody">
    <tr id="loading-row">
      <td class="col-num"></td>
      <td colspan="3" style="padding:48px 0 48px 0; letter-spacing:0.07em; text-transform:uppercase; font-size:12px; opacity:0.35; border-bottom:none;">Loading…</td>
    </tr>
  </tbody>
</table>

<!-- Filter panel -->
<div class="filter-pane-wrap" id="filter-pane-wrap">
  <div class="filter-groups">
    <div class="filter-group fg-year">
      <div class="fg-title">Year</div>
      <div class="fg-opts">
        <label class="filter-opt"><input type="radio" name="year" value="all" checked> All</label>
        <label class="filter-opt"><input type="radio" name="year" value="pre-2000"> Pre-2000</label>
        <label class="filter-opt"><input type="radio" name="year" value="2000s"> 2000s</label>
        <label class="filter-opt"><input type="radio" name="year" value="2010s"> 2010s</label>
        <label class="filter-opt"><input type="radio" name="year" value="2020s"> 2020s</label>
      </div>
    </div>
    <div class="filter-group fg-type">
      <div class="fg-title">Type</div>
      <div class="fg-opts">
        <label class="filter-opt"><input type="radio" name="type" value="all" checked> All</label>
        <label class="filter-opt"><input type="radio" name="type" value="book"> Book</label>
        <label class="filter-opt"><input type="radio" name="type" value="article"> Article</label>
      </div>
    </div>
    <div class="filter-group fg-keywords">
      <div class="fg-title">Keywords</div>
      <div class="fg-kw-cloud" id="fg-keywords-list"></div>
    </div>
  </div>
</div>

<!-- Add Source Modal -->
<div class="add-modal-overlay" id="add-modal-overlay">
  <div class="add-modal">
    <div class="add-modal-title">Add Source</div>
    <div class="add-field">
      <label>Author(s)</label>
      <input type="text" id="add-author" placeholder="Last, F., & Last, F." autocomplete="off">
    </div>
    <div class="add-field">
      <label>Title</label>
      <input type="text" id="add-title" placeholder="Title of work" autocomplete="off">
    </div>
    <div class="add-field">
      <label>Year</label>
      <input type="text" id="add-year" placeholder="2024" maxlength="4" autocomplete="off">
    </div>
    <div class="add-field">
      <label>Citation (APA — use *asterisks* around italicised title)</label>
      <textarea id="add-citation" placeholder="Last, F. (Year). *Title of work*. Publisher."></textarea>
    </div>
    <div class="add-actions">
      <button class="btn-primary" id="add-submit">Add Source</button>
      <button class="btn-cancel" id="add-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Save toast -->
<div class="save-toast" id="save-toast">Saved</div>

<!-- Export button -->
<button class="export-btn" id="export-btn" title="Export to PDF">↓ PDF</button>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ════════════════════════════════════════════════════════════════════════════
//  CONFIG — paste your Supabase project URL and anon key here
// ════════════════════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://dnqtrzsiqkosrxoitzol.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRucXRyenNpcWtvc3J4b2l0em9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0OTY4MDIsImV4cCI6MjA4ODA3MjgwMn0.DRKZA1h9mWBZcp7wWgf-s5ZYpuYUYd1-Z_96GIONjZU';
// ════════════════════════════════════════════════════════════════════════════

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── Debounce utility ─────────────────────────────────────────────────────────
function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

// In-memory state
let _sources = [];
let _kwMap   = {}; // source_id → [{id, source_id, keyword}]
let _activeKeyword = null; // currently filtered keyword, or null
let _sortMode = 'order';   // 'order' | 'year'

// ── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  if (SUPABASE_URL.includes('YOUR_PROJECT')) {
    showConfigError();
    return;
  }
  try {
    const [srcRes, kwRes] = await Promise.all([
      sb.from('sources').select('*').order('sort_order'),
      sb.from('keywords').select('*'),
    ]);
    if (srcRes.error) throw srcRes.error;
    _sources = srcRes.data || [];
    _kwMap = {};
    (kwRes.data || []).forEach(kw => {
      if (!_kwMap[kw.source_id]) _kwMap[kw.source_id] = [];
      _kwMap[kw.source_id].push(kw);
    });
  } catch (e) {
    console.error('Supabase error:', e);
    showError('Could not load data. Check console for details.');
    return;
  }
  renderTable();
}

function showConfigError() {
  const tbody = document.getElementById('sources-tbody');
  tbody.innerHTML = '';
  const tr = document.createElement('tr');
  tr.innerHTML = `<td class="col-num"></td><td colspan="3" style="padding:48px 0; line-height:1.8; border-bottom:none; opacity:0.6; font-size:13px;">
    <strong style="letter-spacing:0.07em;text-transform:uppercase;font-size:11px;">Setup required</strong><br><br>
    Open <code>annotations.html</code> and replace the two placeholder values near the top of the &lt;script&gt; tag:<br><br>
    <code>SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co'</code><br>
    <code>SUPABASE_KEY = 'YOUR_ANON_PUBLIC_KEY'</code><br><br>
    See <code>SETUP.md</code> for full instructions.
  </td>`;
  tbody.appendChild(tr);
}

function showError(msg) {
  const tbody = document.getElementById('sources-tbody');
  tbody.innerHTML = `<tr><td></td><td colspan="3" style="padding:48px 0;border-bottom:none;opacity:0.5;letter-spacing:0.06em;text-transform:uppercase;font-size:12px;">${msg}</td></tr>`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('sources-tbody');
  tbody.innerHTML = '';

  const sorted = [..._sources].sort((a, b) => {
    if (_sortMode === 'year') {
      return (parseInt(a.year) || 9999) - (parseInt(b.year) || 9999);
    }
    return (a.sort_order || 9999) - (b.sort_order || 9999);
  });

  sorted.forEach(s => {
    tbody.appendChild(buildEntryRow(s));
    tbody.appendChild(buildDetailRow(s, _kwMap[s.id] || []));
  });

  setupAll();
  handleHash();
  updateProgress();
  populateKeywordFilter();
}

// ── Deep-link from map: annotations.html#source-01 ───────────────────────────
function handleHash() {
  const hash = window.location.hash; // e.g. "#source-01"
  if (!hash.startsWith('#source-')) return;
  const num = hash.replace('#source-', '');
  // Compare numerically so "01" matches "#source-1", "10" matches "#source-10", etc.
  const src = _sources.find(s => parseInt(s.display_num, 10) === parseInt(num, 10));
  if (!src) return;
  const row    = document.getElementById(src.id);
  const detail = document.getElementById(src.id + '-detail');
  if (!row || !detail) return;
  detail.classList.add('open');
  setTimeout(() => row.scrollIntoView({ behavior: 'smooth', block: 'center' }), 80);
}

// ── Row builders ──────────────────────────────────────────────────────────────
function buildEntryRow(s) {
  const tr = document.createElement('tr');
  tr.className = 'entry-row';
  tr.id = s.id;
  tr.dataset.open = 'false';

  const numTd = document.createElement('td');
  numTd.className = 'col-num';
  numTd.textContent = s.display_num;

  const authTd = document.createElement('td');
  authTd.className = 'col-author';
  authTd.textContent = s.author;

  const secTd = document.createElement('td');
  secTd.className = 'col-section';
  // Use stored title if available; populateTitles() fills in the rest from citation
  secTd.textContent = s.title || s.section;

  const yearTd = document.createElement('td');
  yearTd.className = 'col-year';
  yearTd.textContent = s.year;

  tr.appendChild(numTd);
  tr.appendChild(authTd);
  tr.appendChild(secTd);
  tr.appendChild(yearTd);
  return tr;
}

function buildDetailRow(s, keywords) {
  const tr = document.createElement('tr');
  tr.className = 'entry-detail';
  tr.id = s.id + '-detail';

  const numTd = document.createElement('td');
  numTd.className = 'col-num';

  const innerTd = document.createElement('td');
  innerTd.className = 'detail-inner';
  innerTd.setAttribute('colspan', '3');

  // Citation (HTML content — em tags preserved)
  const citDiv = document.createElement('div');
  citDiv.className = 'detail-citation';
  citDiv.dataset.sourceId = s.id;
  citDiv.innerHTML = s.citation || '';

  // Annotation (plain text)
  const hasAnn = s.annotation && s.annotation.trim();
  const annDiv = document.createElement('div');
  annDiv.className = hasAnn ? 'detail-annotation' : 'detail-annotation pending';
  annDiv.dataset.sourceId = s.id;
  annDiv.textContent = hasAnn ? s.annotation : 'Annotation in progress.';

  // Keywords row
  const kwRow = document.createElement('div');
  kwRow.className = 'keywords-row';
  kwRow.dataset.sourceId = s.id;
  keywords.forEach(kw => kwRow.appendChild(buildPill(kw)));
  const addKwBtn = document.createElement('span');
  addKwBtn.className = 'keyword-add-btn';
  addKwBtn.textContent = '+ keyword';
  kwRow.appendChild(addKwBtn);

  // Bottom action row: Delete source + Terrain
  const actionRow = document.createElement('div');
  actionRow.className = 'action-row';

  const delBtn = document.createElement('span');
  delBtn.className = 'delete-btn';
  delBtn.dataset.sourceId = s.id;
  delBtn.textContent = 'Delete source';

  const editBtn = document.createElement('span');
  editBtn.className = 'edit-btn';
  editBtn.dataset.sourceId = s.id;
  editBtn.textContent = 'Edit';

  actionRow.appendChild(delBtn);
  actionRow.appendChild(editBtn);

  innerTd.appendChild(citDiv);
  innerTd.appendChild(annDiv);
  innerTd.appendChild(kwRow);
  innerTd.appendChild(actionRow);
  tr.appendChild(numTd);
  tr.appendChild(innerTd);
  return tr;
}

function buildPill(kw) {
  const span = document.createElement('span');
  span.className = 'keyword-pill';
  span.dataset.kwId = kw.id;
  span.dataset.keyword = kw.keyword;

  const label = document.createElement('span');
  label.textContent = kw.keyword;
  label.style.cursor = 'pointer';
  label.addEventListener('click', e => {
    e.stopPropagation();
    setKeywordFilter(_activeKeyword === kw.keyword ? null : kw.keyword);
  });

  const x = document.createElement('span');
  x.className = 'keyword-remove';
  x.textContent = '×';
  x.title = 'Remove';

  span.appendChild(label);
  span.appendChild(x);
  return span;
}

// ── Keyword cloud in filter panel ─────────────────────────────────────────────
function populateKeywordFilter() {
  const container = document.getElementById('fg-keywords-list');
  if (!container) return;
  container.innerHTML = '';

  // Only count keywords among sources that pass the current year/type filters
  const yearVal = document.querySelector('input[name="year"]:checked')?.value || 'all';
  const typeVal = document.querySelector('input[name="type"]:checked')?.value || 'all';
  const visibleIds = new Set();
  document.querySelectorAll('#sources-tbody .entry-row').forEach(row => {
    const yearOk = yearVal === 'all' || row.dataset.yearBucket === yearVal;
    const typeOk = typeVal === 'all' || row.dataset.type === typeVal;
    if (yearOk && typeOk) visibleIds.add(row.id);
  });

  // Collect unique keywords with source counts (filtered)
  // Deduplicate: count each keyword at most once per source
  const kwCounts = new Map();
  Object.entries(_kwMap).forEach(([sourceId, kwArr]) => {
    if (!visibleIds.has(sourceId)) return;
    const seenForSource = new Set();
    kwArr.forEach(kw => {
      const k = kw.keyword.toLowerCase();
      if (!seenForSource.has(k)) {
        seenForSource.add(k);
        kwCounts.set(k, (kwCounts.get(k) || 0) + 1);
      }
    });
  });

  // Only surface keywords that appear across ≥ 2 sources (the "main" themes)
  const MIN = 2;
  const mainKws = [...kwCounts.keys()]
    .filter(kw => kwCounts.get(kw) >= MIN)
    .sort(); // keys are already lowercased

  if (mainKws.length === 0) {
    const empty = document.createElement('span');
    empty.style.cssText = 'opacity:0.3; font-size:10px; letter-spacing:0.06em; text-transform:uppercase;';
    empty.textContent = 'Tag ≥ 2 sources with a keyword to surface it here';
    container.appendChild(empty);
    return;
  }

  mainKws.forEach(keyword => {
    const count = kwCounts.get(keyword);
    const tag = document.createElement('span');
    tag.className = 'fg-kw-tag';
    tag.dataset.keyword = keyword;
    tag.classList.toggle('active', keyword === _activeKeyword);
    // Label + count badge
    tag.innerHTML = `${keyword} <span style="opacity:0.45; font-size:8px; margin-left:2px;">${count}</span>`;
    tag.addEventListener('click', e => {
      e.stopPropagation();
      setKeywordFilter(_activeKeyword === keyword ? null : keyword);
    });
    container.appendChild(tag);
  });
}

// ── Keyword filter ────────────────────────────────────────────────────────────
function setKeywordFilter(kw) {
  _activeKeyword = kw;

  // Highlight matching pills in expanded source rows
  document.querySelectorAll('.keyword-pill').forEach(p => {
    p.classList.toggle('kw-active', p.dataset.keyword === kw);
  });

  // Highlight active tag in the filter panel cloud
  document.querySelectorAll('.fg-kw-tag').forEach(t => {
    t.classList.toggle('active', t.dataset.keyword === kw);
  });

  applyFilters();
}

function setupAll() {

// ── Tag rows for filtering ────────────────────────────────────────────────────
function tagRows() {
  document.querySelectorAll('#sources-tbody .entry-row').forEach(row => {
    const src = _sources.find(s => s.id === row.id);
    if (src) row.dataset.section = src.section;
    const yr = parseInt(row.querySelector('.col-year')?.textContent) || 0;
    row.dataset.yearBucket = yr < 2000 ? 'pre-2000' : yr < 2010 ? '2000s' : yr < 2020 ? '2010s' : '2020s';
    const detail = document.getElementById(row.id + '-detail');
    if (detail) {
      const cit = detail.querySelector('.detail-citation');
      const hasDoi = cit && (cit.textContent.includes('doi.org') || cit.textContent.includes('DOI'));
      row.dataset.type = hasDoi ? 'article' : 'book';
    }
  });
}

// ── Populate title column from citation ───────────────────────────────────────
function populateTitles() {
  document.querySelectorAll('.entry-row').forEach(row => {
    const titleCell = row.querySelector('.col-section');
    const detail = document.getElementById(row.id + '-detail');
    if (!titleCell || !detail) return;
    // Skip rows that already have a stored title (not a section name)
    const src = _sources.find(s => s.id === row.id);
    if (src && src.title) return;
    // Fall back: extract title from citation HTML
    const cit = detail.querySelector('.detail-citation');
    if (!cit) return;
    const html = cit.innerHTML;
    const artMatch = html.match(/\)\.\s+([^<]+?)\s*\.\s*<em>/i);
    if (artMatch && artMatch[1].trim().length > 4) {
      titleCell.textContent = artMatch[1].trim();
      return;
    }
    const em = cit.querySelector('em');
    if (em) titleCell.textContent = em.textContent.trim();
  });
}

// ── Accordion ────────────────────────────────────────────────────────────────
function setupAccordion() {
  document.querySelectorAll('.entry-row').forEach(row => {
    row.addEventListener('click', () => {
      const detail = document.getElementById(row.id + '-detail');
      if (!detail) return;
      const isOpen = detail.classList.contains('open');
      document.querySelectorAll('.entry-detail.open').forEach(d => d.classList.remove('open'));
      if (!isOpen) detail.classList.add('open');
    });
  });
}

// ── Annotation editing → saves to Supabase ────────────────────────────────────
function setupAnnotationEditing() {
  document.querySelectorAll('.detail-annotation').forEach(ann => {
    ann.addEventListener('click', e => {
      e.stopPropagation();
      if (ann.classList.contains('pending')) {
        ann.classList.remove('pending');
        ann.textContent = '';
      }
      ann.contentEditable = 'plaintext-only';
      ann.focus();
    });

    // Auto-save every 60 s of activity — shows toast so you know it happened
    const debouncedSave = debounce(async () => {
      const text = ann.innerText.trim();
      const sourceId = ann.dataset.sourceId;
      if (!sourceId) return;
      const { error } = await sb.from('sources')
        .update({ annotation: text })
        .eq('id', sourceId);
      if (error) { console.error(error); showToast('Error saving'); }
      else {
        const s = _sources.find(x => x.id === sourceId);
        if (s) s.annotation = text;
        showToast('Saved');
      }
    }, 60000);
    ann.addEventListener('input', debouncedSave);

    ann.addEventListener('blur', async () => {
      // Read text BEFORE setting contentEditable=false
      const text = ann.innerText.trim();
      ann.contentEditable = 'false';
      if (!text) {
        ann.classList.add('pending');
        ann.textContent = 'Annotation in progress.';
      }
      const sourceId = ann.dataset.sourceId;
      if (!sourceId) return;
      const { error } = await sb.from('sources')
        .update({ annotation: text })
        .eq('id', sourceId);
      if (error) { console.error(error); showToast('Error saving'); }
      else {
        const s = _sources.find(x => x.id === sourceId);
        if (s) s.annotation = text;
        updateProgress();
        showToast('Saved');
      }
    });

    ann.addEventListener('keydown', e => {
      if (e.key === 'Escape') { ann.blur(); return; }
      if (e.key === 'Tab') {
        e.preventDefault();
        const sel = window.getSelection();
        if (!sel.rangeCount) return;
        const range = sel.getRangeAt(0);
        range.deleteContents();
        const tab = document.createTextNode('\t');
        range.insertNode(tab);
        range.setStartAfter(tab);
        range.collapse(true);
        sel.removeAllRanges();
        sel.addRange(range);
      }
    });
    ann.addEventListener('paste', e => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text/plain');
      document.execCommand('insertText', false, text);
    });
  });
}

// ── Citation editing → saves to Supabase ──────────────────────────────────────
function setupCitationEditing() {
  document.querySelectorAll('.detail-citation').forEach(cit => {
    cit.addEventListener('click', e => {
      e.stopPropagation();
      cit.contentEditable = 'true';
      cit.focus();
    });

    // Auto-save every 60 s of activity — shows toast so you know it happened
    const debouncedSave = debounce(async () => {
      const html = cit.innerHTML.trim();
      const sourceId = cit.dataset.sourceId;
      if (!sourceId) return;
      const { error } = await sb.from('sources')
        .update({ citation: html })
        .eq('id', sourceId);
      if (error) { console.error(error); showToast('Error saving'); }
      else {
        const s = _sources.find(x => x.id === sourceId);
        if (s) s.citation = html;
        showToast('Saved');
      }
    }, 60000);
    cit.addEventListener('input', debouncedSave);

    cit.addEventListener('blur', async () => {
      // Read HTML BEFORE setting contentEditable=false
      const html = cit.innerHTML.trim();
      cit.contentEditable = 'false';
      const sourceId = cit.dataset.sourceId;
      if (!sourceId) return;
      const { error } = await sb.from('sources')
        .update({ citation: html })
        .eq('id', sourceId);
      if (error) { console.error(error); showToast('Error saving'); }
      else {
        const s = _sources.find(x => x.id === sourceId);
        if (s) s.citation = html;
        // Re-run title extraction for this row
        const row = document.getElementById(sourceId);
        if (row) {
          const detail = document.getElementById(sourceId + '-detail');
          const titleCell = row.querySelector('.col-section');
          if (detail && titleCell) {
            const em = cit.querySelector('em');
            if (em) titleCell.textContent = em.textContent.trim();
          }
        }
        showToast('Saved');
      }
    });
    cit.addEventListener('keydown', e => {
      if (e.key === 'Escape') cit.blur();
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); cit.blur(); }
    });
  });
}

// ── Edit button → opens modal pre-filled for updating a source ────────────────
function setupEditButtons() {
  document.querySelectorAll('.edit-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const sourceId = btn.dataset.sourceId;
      const s = _sources.find(x => x.id === sourceId);
      if (!s) return;
      // Pre-fill modal fields
      document.getElementById('add-author').value  = s.author  || '';
      document.getElementById('add-title').value   = s.title   || '';
      document.getElementById('add-year').value    = s.year    || '';
      // Convert <em> back to *asterisks* for editing
      const rawCit = (s.citation || '').replace(/<em>(.*?)<\/em>/gi, '*$1*').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
      document.getElementById('add-citation').value = rawCit;
      // Switch modal to edit mode
      _editingSourceId = sourceId;
      document.querySelector('.add-modal-title').textContent = 'Edit Source';
      addSubmit.textContent = 'Save Changes';
      addOverlay.classList.add('open');
    });
  });
}

// ── Keywords ──────────────────────────────────────────────────────────────────
function setupKeywords() {
  // Remove keyword
  document.querySelectorAll('.keyword-remove').forEach(btn => {
    btn.addEventListener('click', async e => {
      e.stopPropagation();
      const pill = btn.closest('.keyword-pill');
      const kwId = pill?.dataset.kwId;
      if (!kwId) return;
      const { error } = await sb.from('keywords').delete().eq('id', kwId);
      if (error) { console.error(error); return; }
      // Update local cache
      const sourceId = pill.closest('.keywords-row')?.dataset.sourceId;
      if (sourceId && _kwMap[sourceId]) {
        _kwMap[sourceId] = _kwMap[sourceId].filter(k => k.id !== kwId);
      }
      pill.remove();
      showToast('Removed');
    });
  });

  // Add keyword
  document.querySelectorAll('.keyword-add-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (btn.nextSibling?.classList?.contains('keyword-input')) return; // already open
      const input = document.createElement('input');
      input.className = 'keyword-input';
      input.type = 'text';
      input.placeholder = 'keyword…';
      input.spellcheck = false;
      btn.parentNode.insertBefore(input, btn);
      input.focus();

      const save = async () => {
        const val = input.value.trim().toLowerCase();
        input.remove();
        if (!val) return;
        const kwRow = btn.closest('.keywords-row');
        const sourceId = kwRow?.dataset.sourceId;
        if (!sourceId) return;
        showToast('Saving…');
        const { data, error } = await sb.from('keywords')
          .insert({ source_id: sourceId, keyword: val })
          .select().single();
        if (error) { console.error(error); showToast('Error'); return; }
        if (!_kwMap[sourceId]) _kwMap[sourceId] = [];
        _kwMap[sourceId].push(data);
        // Insert pill before the add button
        const pill = buildPill(data);
        kwRow.insertBefore(pill, btn);
        // Wire remove on new pill
        pill.querySelector('.keyword-remove').addEventListener('click', async ev => {
          ev.stopPropagation();
          const { error: delErr } = await sb.from('keywords').delete().eq('id', data.id);
          if (!delErr) {
            _kwMap[sourceId] = _kwMap[sourceId].filter(k => k.id !== data.id);
            pill.remove();
            showToast('Removed');
          }
        });
        showToast('Saved');
      };

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); save(); }
        if (e.key === 'Escape') { input.remove(); }
      });
      input.addEventListener('blur', save);
    });
  });
}

// ── Delete source ─────────────────────────────────────────────────────────────
function setupDeleteButtons() {
  document.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', async e => {
      e.stopPropagation();
      const sourceId = btn.dataset.sourceId;
      if (!sourceId) return;
      const src = _sources.find(s => s.id === sourceId);
      const label = src ? `${src.author} (${src.year})` : sourceId;
      if (!confirm(`Delete "${label}"? This cannot be undone.`)) return;
      showToast('Deleting…');
      const { error } = await sb.from('sources').delete().eq('id', sourceId);
      if (error) { console.error(error); showToast('Error deleting'); return; }
      // Remove from local state
      _sources = _sources.filter(s => s.id !== sourceId);
      delete _kwMap[sourceId];
      // Remove from DOM
      const row    = document.getElementById(sourceId);
      const detail = document.getElementById(sourceId + '-detail');
      row?.remove();
      detail?.remove();
      showToast('Deleted');
    });
  });
}

// ── Filter ────────────────────────────────────────────────────────────────────
function setupFilterListeners() {
  document.querySelectorAll('input[name="year"], input[name="type"]')
    .forEach(r => r.addEventListener('change', applyFilters));
  document.getElementById('search-input')?.addEventListener('input', applyFilters);
  document.getElementById('search-input')?.addEventListener('click', e => e.stopPropagation());
}

function applyFilters() {
  const yearVal   = document.querySelector('input[name="year"]:checked').value;
  const typeVal   = document.querySelector('input[name="type"]:checked').value;
  const searchVal = (document.getElementById('search-input')?.value || '').toLowerCase().trim();

  document.querySelectorAll('.entry-row').forEach(row => {
    let ok = (yearVal === 'all' || row.dataset.yearBucket === yearVal)
          && (typeVal === 'all' || row.dataset.type       === typeVal);
    if (ok && searchVal) ok = row.textContent.toLowerCase().includes(searchVal);
    // Keyword filter: show only sources that have the active keyword (case-insensitive)
    if (ok && _activeKeyword) {
      const kws = _kwMap[row.id] || [];
      ok = kws.some(k => k.keyword.toLowerCase() === _activeKeyword.toLowerCase());
    }
    row.style.display = ok ? '' : 'none';
    const detail = document.getElementById(row.id + '-detail');
    if (detail) detail.style.display = ok ? '' : 'none';
  });
  // Keep keyword cloud counts in sync with active year/type filters
  populateKeywordFilter();
}

// ── Add / Edit Source Modal ───────────────────────────────────────────────────
const addBtn     = document.getElementById('add-btn');
const addOverlay = document.getElementById('add-modal-overlay');
const addCancel  = document.getElementById('add-cancel');
const addSubmit  = document.getElementById('add-submit');
let _editingSourceId = null; // null = add mode; set to source id = edit mode

addBtn.addEventListener('click', e => {
  e.stopPropagation();
  _editingSourceId = null;
  document.querySelector('.add-modal-title').textContent = 'Add Source';
  addSubmit.textContent = 'Add Source';
  addOverlay.classList.add('open');
  document.getElementById('add-author').focus();
});
addCancel.addEventListener('click', () => closeModal());
addOverlay.addEventListener('click', e => { if (e.target === addOverlay) closeModal(); });

function closeModal() {
  addOverlay.classList.remove('open');
  _editingSourceId = null;
  document.querySelector('.add-modal-title').textContent = 'Add Source';
  addSubmit.textContent = 'Add Source';
  ['add-author','add-title','add-year','add-citation'].forEach(id => document.getElementById(id).value = '');
}

addSubmit.addEventListener('click', async () => {
  const author   = document.getElementById('add-author').value.trim();
  const title    = document.getElementById('add-title').value.trim();
  const year     = document.getElementById('add-year').value.trim();
  const rawCit   = document.getElementById('add-citation').value.trim();

  if (!author || !title || !year) { alert('Author, title, and year are required.'); return; }

  // Convert *asterisks* to <em> for italic titles
  const citation = rawCit.replace(/\*([^*]+)\*/g, '<em>$1</em>');

  addSubmit.disabled = true;
  addSubmit.textContent = _editingSourceId ? 'Saving…' : 'Adding…';

  if (_editingSourceId) {
    // ── EDIT MODE: update existing source ──────────────────────────────────
    const { error } = await sb.from('sources').update({
      author:       author,
      title:        title,
      year:         year,
      data_year:    parseInt(year) < 2000 ? 'pre-2000' : parseInt(year) < 2010 ? '2000s' : parseInt(year) < 2020 ? '2010s' : '2020s',
      data_type:    citation.includes('doi.org') || citation.includes('DOI') ? 'article' : 'book',
      citation:     citation,
    }).eq('id', _editingSourceId);

    addSubmit.disabled = false;
    if (error) { console.error(error); alert('Error: ' + error.message); return; }

    // Update local cache
    const s = _sources.find(x => x.id === _editingSourceId);
    if (s) { s.author = author; s.title = title; s.year = year; s.citation = citation; }

    const editedId = _editingSourceId;
    closeModal();
    showToast('Saved');
    renderTable();
    setTimeout(() => {
      const row    = document.getElementById(editedId);
      const detail = document.getElementById(editedId + '-detail');
      if (row && detail) {
        detail.classList.add('open');
        row.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }, 100);

  } else {
    // ── ADD MODE: insert new source ────────────────────────────────────────
    const maxOrder = _sources.length > 0 ? Math.max(..._sources.map(s => s.sort_order)) : 0;
    const maxNum   = _sources.length > 0 ? Math.max(..._sources.map(s => parseInt(s.display_num) || 0)) : 0;
    const newId    = 'source-' + Date.now();

    const { data, error } = await sb.from('sources').insert({
      id:           newId,
      display_num:  String(maxNum + 1),
      author:       author,
      title:        title,
      year:         year,
      data_year:    parseInt(year) < 2000 ? 'pre-2000' : parseInt(year) < 2010 ? '2000s' : parseInt(year) < 2020 ? '2010s' : '2020s',
      data_type:    citation.includes('doi.org') || citation.includes('DOI') ? 'article' : 'book',
      citation:     citation,
      annotation:   '',
      sort_order:   maxOrder + 1,
    }).select().single();

    addSubmit.disabled = false;
    if (error) { console.error(error); alert('Error: ' + error.message); return; }

    _sources.push(data);
    closeModal();
    showToast('Source added');
    renderTable();
    setTimeout(() => {
      const newRow    = document.getElementById(newId);
      const newDetail = document.getElementById(newId + '-detail');
      if (newRow && newDetail) {
        newDetail.classList.add('open');
        newRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }, 100);
  }
});

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('save-toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ── Export to PDF ─────────────────────────────────────────────────────────────
document.getElementById('export-btn').addEventListener('click', () => {
  if (!_sources.length) { alert('Sources not loaded yet.'); return; }

  const allSources = [..._sources]
    .sort((a, b) => (a.sort_order || 9999) - (b.sort_order || 9999));

  const annotatedCount = allSources.filter(s => s.annotation && s.annotation.trim()).length;
  const pct = Math.round(annotatedCount / allSources.length * 100);
  const statsHtml = `<div class="stats-block">
    <span class="stat-label">Annotation progress</span>
    <span class="stat-value">${annotatedCount} of ${allSources.length} sources annotated (${pct}%)</span>
  </div>`;

  let bodyHtml = '';

  allSources.forEach((s, i) => {
    const hasAnn = s.annotation && s.annotation.trim();
    const annHtml = hasAnn
      ? `<div class="annotation">${s.annotation.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`
      : '';

    const kws = (_kwMap[s.id] || []).map(k =>
      `<span class="pill">${k.keyword}</span>`).join('');
    const kwHtml = kws ? `<div class="pills">${kws}</div>` : '';

    bodyHtml += `
      <div class="source">
        <div class="source-meta">
          <span class="num">${i + 1}</span>
          <span class="author">${s.author}</span>
          <span class="year">${s.year}</span>
        </div>
        <div class="citation">${s.citation || ''}</div>
        ${annHtml}
        ${kwHtml}
      </div>`;
  });

  const printHtml = `<!DOCTYPE html>
<html lang="en">
<head>

  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>

      font-size: 11px;

      padding: 60px 72px;
      max-width: 860px;
      margin: 0 auto;
    }
    h1 {
      font-size: 22px;
      font-weight: 400;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 11px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      opacity: 0.4;
      margin-bottom: 20px;
    }
    .stats-block {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 40px;
      padding: 10px 14px;
      background: #f7f7f7;
      border-left: 2px solid #111;
    }
    .stat-label {
      font-size: 9px;
      letter-spacing: 0.10em;

    }

      font-size: 13px;

    }
    .source {
      margin-bottom: 36px;
      page-break-inside: avoid;
    }
    .source-meta {
      display: flex;
      gap: 16px;
      align-items: baseline;
      margin-bottom: 4px;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .num  { opacity: 0.35; min-width: 24px; }
    .author { font-weight: 500; }
    .year { opacity: 0.5; }
    .citation {
      font-size: 11px;

    }

    .annotation {
      font-family: 'EB Garamond', Georgia, serif;

  const win = window.open('', '_blank');

});
