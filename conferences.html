<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conferences — Organizational Worldviews</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    a { text-decoration: none; }

    :root {
      --ink:   #111111;
      --rule:  #111111;
      --ff:    'Suisse Intl', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --serif: 'EB Garamond', Georgia, serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: #ffffff;
      color: var(--ink);
      font-family: var(--ff);
      font-size: 16px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Table (fills page, matches annotations) ── */
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      padding: 0 24px;
    }

    /* Sticky header — exact match to annotations.html */
    thead th {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 10px 0;
      background: #ffffff;
      border-bottom: 1px solid var(--ink);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      font-weight: 400;
      vertical-align: middle;
      text-align: left;
      font-size: 14px;
    }

    /* Nav links — exact match to annotations.html */
    .map-link {
      color: var(--ink);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 14px;
    }
    .map-link:hover { opacity: 0.5; }

    td {
      padding: 20px 0;
      vertical-align: top;
      border-bottom: 1px solid var(--rule);
    }

    /* Column widths */
    .col-num   { width: 10%;  padding-left: 24px; font-variant-numeric: tabular-nums; vertical-align: middle; }
    .col-name  { width: 50%;  padding-right: 28px; }
    .col-type  { width: 16%;  vertical-align: middle; }
    .col-dead  { width: 24%;  vertical-align: top; padding-right: 24px; }

    thead th.col-num  { padding-left: 24px; }
    thead th.col-dead { padding-right: 24px; }

    /* Entry name & host */
    .entry-name {
      font-size: 22px;
      font-weight: 400;
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .entry-host {
      font-size: 12px;
      letter-spacing: 0.02em;
      line-height: 1.4;
    }

    /* Type badge */
    .type-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      border: 1px solid var(--ink);
      border-radius: 100px;
      padding: 4px 12px;
    }

    /* Deadline column */
    .dl-label { font-size: 15px; font-weight: 400; margin-bottom: 3px; padding-top: 10px; }
    .dl-sub   { font-size: 12px; letter-spacing: 0.02em; }

    /* Deadline status — keep red urgent, keep blue desc */
    .urgent { color: #cc2222; }
    .open   { color: #111111; }
    .closed { color: #111111; }

    /* Row interaction */
    .entry-row { cursor: pointer; }

    /* Detail row */
    .entry-detail { display: none; }
    .entry-detail.open { display: table-row; }
    .entry-detail td { padding-top: 0; border-bottom: 1px solid var(--ink); background: #ffffff; }
    .detail-inner { padding: 4px 28px 36px 0; }

    /* Big Garamond description — keep blue */
    .detail-desc {
      font-family: var(--serif);
      font-size: 24px;
      line-height: 1.6;
      color: #2255cc;
      padding: 20px 0 24px;
      max-width: 720px;
    }

    /* Relevance section */
    .detail-sec {
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .detail-relevance {
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 20px;
      max-width: 680px;
    }

    /* Event meta */
    .detail-event {
      font-size: 12px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* Link */
    .detail-link {
      font-size: 12px;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--ink);
      border-bottom: 1px solid var(--ink);
      padding-bottom: 1px;
      transition: opacity 0.15s;
    }
    .detail-link:hover { opacity: 0.4; }

    /* Mobile */
    @media (max-width: 768px) {
      .col-type { display: none; }
      .col-num  { width: 12%; }
      .col-name { width: 58%; }
      .col-dead { width: 30%; }
      .entry-name { font-size: 15px; }
      thead th { padding: 8px 0; font-size: 11px; }
      .map-link { display: inline; font-size: 11px; }
    }
    @media (max-width: 480px) {
      .col-num { display: none; }
      .col-name { width: 65%; }
      .col-dead { width: 35%; }
    }
  </style>
</head>
<body>

  dr.className = 'entry-detail';
  dr.id = `d${i}`;
  const evtLine = c.location ? `${c.eventDate} · ${c.location}` : c.eventDate;
  dr.innerHTML = `
